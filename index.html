<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agro Forte</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

</head>

<body>

<!-- PARTICLES -->
<div id="particles-js"></div>

<!-- TELA INICIAL -->
<div id="intro-screen">

<h1>🌱 Agro Forte</h1>

<p>
Tecnologia e sustentabilidade para o agro
</p>

<button onclick="entrarSite()">
Entrar no Site
</button>

</div>

<!-- SITE -->
<div id="site-content">

<header>

<h1>🌾 Agro Forte</h1>

<p>
Monitoramento agrícola inteligente
</p>

</header>

<!-- CLIMA -->
<section class="weather-box">

<h3>🌦️ Carregando clima...</h3>

</section>

<!-- DIAGNÓSTICO -->
<section class="diagnostico">

<h2>
🌱 Diagnóstico Agrícola IA
</h2>

<input
type="text"
id="cidadeInput"
placeholder="Digite uma cidade"
/>

<button onclick="analisarCidade()">
Analisar
</button>

<div id="resultadoCultivos"></div>

</section>

</div>

<script src="script.js"></script>

</html>
