<section id="diagnostico" class="diagnostico-section hidden">
    <div class="container">
        <h2 class="title">Diagnóstico Agrícola Inteligente</h2>
        <p class="diagnostico-texto">Descubra os melhores cultivos para sua região e clima.</p>

      <div class="diagnostico-box">
    <div class="busca-cidade">
        <label>Digite sua cidade do Paraná</label>
        <input type="text" id="cidadeInput" placeholder="Ex: Londrina..." autocomplete="off">
        
        <div id="sugestoesCidade"></div> 
    </div>

    <div class="filtros-agro">
        </div>
    
    <button class="btn-agro" onclick="analisarCidade()">Analisar</button>
</div>

            <div class="filtros-agro">
                <div class="filtro-box">
                    <label>Porte da Produção</label>
                    <select id="porteProducao">
                        <option value="pequeno">Pequeno Produtor</option>
                        <option value="medio">Médio Produtor</option>
                        <option value="grande">Grande Produtor</option>
                    </select>
                </div>
                <div class="filtro-box">
                    <label>Tamanho da Área (Hectares)</label>
                    <input type="number" id="areaHectares" placeholder="Ex: 15">
                </div>
            </div>

            <button class="btn-agro" onclick="analisarCidade()">Analisar Região</button>
        </div>

        <div id="resultadoCultivos" class="resultado-cultivos"></div>
    </div>
</section>
