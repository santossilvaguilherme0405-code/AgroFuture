<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroFuture - Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
    </div>

    <div id="intro-screen">
        <h1>AgroFuture</h1>
        <p>Inovação e Sustentabilidade no Campo</p>
        <button class="btn-agro" onclick="entrarSite()">Entrar no Site</button>
    </div>

    <div id="site-content" style="opacity: 0;">
        <div id="particles-js"></div>

        <nav class="navbar">
            <div class="logo">🌿 AgroFuture</div>
            <div class="nav-links">
                <a href="#diagnostico">Diagnóstico</a>
                <a href="#tecnologias">Tecnologias</a>
            </div>
            <button id="themeBtn">🌙</button>
        </nav>

        <div class="container">
            
            <section id="clima" class="section">
                <div class="weather-box">
                    <h3>Carregando clima...</h3>
                </div>
            </section>

            <section id="diagnostico" class="section">
                <h2 class="title">Diagnóstico Agrícola Inteligente</h2>
                <div class="diagnostico-box">
                    <div class="busca-cidade">
                        <label>Digite sua cidade do Paraná</label>
                        <input type="text" id="cidadeInput" placeholder="Ex: Guarapuava..." autocomplete="off">
                        <div id="sugestoesCidade"></div>
                    </div>
                    
                    <div class="filtros-agro">
                        <div class="filtro-item">
                            <label>Porte da Produção</label>
                            <select id="porteProducao">
                                <option>Pequeno Produtor</option>
                                <option>Médio Produtor</option>
                                <option>Grande Produtor</option>
                            </select>
                        </div>
                        <div class="filtro-item">
                            <label>Área (Hectares)</label>
                            <input type="number" id="areaHectares" placeholder="Ex: 15">
                        </div>
                    </div>
                    
                    <button class="btn-agro" onclick="analisarCidade()">Analisar Região</button>
                </div>
                <div id="resultadoCultivos"></div>
            </section>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script src="script.js"></script>
</body>
</html>
