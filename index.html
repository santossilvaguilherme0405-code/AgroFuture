<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroFuture - Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
    </div>

    <div id="intro-screen">
        <div class="intro-content">
            <h1 style="font-size: 3rem; margin-bottom: 20px;">AgroFuture</h1>
            <p style="margin-bottom: 30px;">Inovação e Sustentabilidade no Campo</p>
            <button class="btn-agro" onclick="entrarSite()">Entrar no Site</button>
        </div>
    </div>

    <div id="site-content" style="opacity: 0;">
        <div id="particles-js"></div>

        <nav class="navbar">
            <div class="logo">🌿 AgroFuture</div>
            <div class="nav-links">
                <a href="#tecnologias">Tecnologias</a>
                <a href="#clima">Clima</a>
                <a href="#diagnostico">Diagnóstico</a>
            </div>
            <button id="themeBtn" style="background:none; border:none; cursor:pointer; font-size:20px;">🌙</button>
        </nav>

        <div class="container">
            
            <section id="clima" class="section">
                <div class="weather-box">
                    <h3>Cargando clima...</h3>
                </div>
            </section>

            <section id="diagnostico" class="section">
                <h2 class="title">Diagnóstico Agrícola Inteligente</h2>
                <div class="diagnostico-box">
                    <div class="busca-cidade">
                        <label>Digite sua cidade do Paraná</label>
                        <input type="text" id="cidadeInput" placeholder="Ex: Cascavel..." autocomplete="off">
                        <div id="sugestoesCidade"></div>
                    </div>
                    
                    <div class="filtros-agro" style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
                        <select id="porteProducao"><option>Pequeno Produtor</option></select>
                        <input type="number" id="areaHectares" placeholder="Hectares">
                    </div>
                    
                    <button class="btn-agro" onclick="analisarCidade()">Analisar Região</button>
                </div>
                <div id="resultadoCultivos"></div>
            </section>

            <section id="tecnologias" class="section">
                <h2 class="title">Tecnologias Sustentáveis</h2>
                <div class="grid-cards" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                    <div class="card" onclick="openModal(1)">Irrigação</div>
                    <div class="card" onclick="openModal(2)">Drones</div>
                    <div class="card" onclick="openModal(3)">Energia Solar</div>
                </div>
            </section>

        </div>
    </div>

    <div id="modal" class="modal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8);">
        <div class="modal-content" style="background:#0a1f12; margin:15% auto; padding:20px; border:1px solid #00ff88; width:80%; max-width:500px; border-radius:20px;">
            <span onclick="closeModal()" style="float:right; cursor:pointer;">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalText"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script src="script.js"></script>
</body>
</html>
