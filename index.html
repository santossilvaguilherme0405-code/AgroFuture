<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroFuture - Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
    </div>

    <div id="intro-screen">
        <div class="intro-content">
            <h1>AgroFuture</h1>
            <p>Inovação e Sustentabilidade no Campo</p>
            <button class="btn-agro" onclick="entrarSite()">Entrar no Site</button>
        </div>
    </div>

    <div id="site-content" style="display: none; opacity: 0;">
        <div id="particles-js"></div>

        <nav class="navbar">
            <div class="logo">🌿 AgroFuture</div>
            <div class="nav-links">
                <a href="#clima">Clima</a>
                <a href="#diagnostico">Diagnóstico</a>
            </div>
            <button id="themeBtn" onclick="toggleTheme()">🌙</button>
        </nav>

        <main class="container">
            <section id="clima" class="section">
                <h2 class="title">Clima em Tempo Real</h2>
                <div class="weather-box" id="weather-result">
                    <p>Detectando localização...</p>
                </div>
            </section>

            <section id="diagnostico" class="section">
                <h2 class="title">Diagnóstico Agrícola Inteligente</h2>
                <div class="diagnostico-box">
                    <div class="busca-cidade">
                        <label for="cidadeInput">Sua cidade no Paraná:</label>
                        <input type="text" id="cidadeInput" placeholder="Ex: Guarapuava..." autocomplete="off">
                        <div id="sugestoesCidade"></div>
                    </div>

                    <div class="filtros-agro">
                        <div class="filtro-item">
                            <label>Porte</label>
                            <select id="porteProducao">
                                <option value="pequeno">Pequeno</option>
                                <option value="medio">Médio</option>
                                <option value="grande">Grande</option>
                            </select>
                        </div>
                        <div class="filtro-item">
                            <label>Área (ha)</label>
                            <input type="number" id="areaHectares" placeholder="Ex: 20">
                        </div>
                    </div>

                    <button class="btn-agro" onclick="analisarCidade()">Gerar Diagnóstico</button>
                </div>

                <div id="resultadoCultivos"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script src="script.js"></script>
</body>
</html>
